<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NG - Menu de Links</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="./Assets/imgs/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Efeito de iluminação interativo -->
    <div class="glow-effect"></div>

    <!-- Container principal -->
    <div class="ng-links-container">
        <div class="ng-links-card">
            <!-- Seção do logo -->
            <div class="ng-logo-section">
                <img 
                    src="./Assets/imgs/logongturismo.png" 
                    alt="NG Logo" 
                    class="ng-logo"
                    loading="lazy"
                >
            </div>

            <!-- Banner com foto  -->
            <img 
                src="./Assets/imgs/banner1.png" 
                alt="NG Entrepreneurs" 
                class="ng-banner"
                loading="lazy"
            >

            <!-- Título e subtítulo -->
            <h1 class="ng-title">NG Turismo</h1>
            <p class="ng-subtitle">Conecte-se com a gente em nossas redes sociais</p>

            <!-- Links de redes sociais -->

                style="background: linear-gradient(135deg, rgba(0, 102, 204, 0.3) 0%, rgba(0, 102, 204, 0.15) 100%);
                       border-color: rgb(0, 102, 204);
                       box-shadow: 0 8px 24px rgba(0, 102, 204, 0.562);">
                    <img 
                        src="./Assets/imgs/whatsapplogo.png" 
                        alt="WhatsApp" 
                        class="ng-social-icon"
                        loading="lazy"
                    >
                    <span class="ng-social-text">WhatsApp</span>
                    <svg class="ng-social-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>

                <a href="https://ngturismo.com.br" target="_blank" rel="noopener noreferrer" class="ng-social-link" title="Visite nosso Website">
                    <img 
                        src="./Assets/imgs/redelogo.png" 
                        alt="Website" 
                        class="ng-social-icon"
                        loading="lazy"
                    >
                    <span class="ng-social-text">Website</span>
                    <svg class="ng-social-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>

                <a href="https://www.youtube.com/@ngturismo" target="_blank" rel="noopener noreferrer" class="ng-social-link" title="Visite nosso YouTube">
                    <img 
                        src="./Assets/imgs/youtubelogo.png" 
                        alt="YouTube" 
                        class="ng-social-icon"
                        loading="lazy"
                    >
                    <span class="ng-social-text">YouTube</span>
                    <svg class="ng-social-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>

                <a href="https://www.tiktok.com/@gnxturismo?_r=1&_t=ZS-950yqzqogoz" target="_blank" rel="noopener noreferrer" class="ng-social-link" title="Visite nosso TikTok">
                    <img 
                        src="./Assets/imgs/tiktoklogo.png" 
                        alt="TikTok" 
                        class="ng-social-icon"
                        loading="lazy"
                    >
                    <span class="ng-social-text">TikTok</span>
                    <svg class="ng-social-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>

                <a href="https://www.instagram.com/ngturismoo?igsh=bmUwM3JkNDFudXBr&utm_source=qr" target="_blank" rel="noopener noreferrer" class="ng-social-link" title="Visite nosso Facebook">
                    <img 
                        src="./Assets/imgs/instagramlogo.png" 
                        alt="Instagram" 
                        class="ng-social-icon"
                        loading="lazy"
                    >
                    <span class="ng-social-text">Instagram</span>
                    <svg class="ng-social-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </a>
            </div>

            <!-- Rodapé -->
            <div class="ng-footer">
                <p>© 2026 NG Turismo. Todos os direitos reservados.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
